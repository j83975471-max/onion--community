# serverless.yml
component: express # 使用 express 组件
name: onion-submission-app

inputs:
  src:
    src: ./
    exclude:
      - .env
      - node_modules/**
      - .git/**
  region: ap-guangzhou # 建议选择离您近的地域，如 ap-shanghai, ap-beijing
  runtime: Nodejs16.13 # 腾讯云推荐的稳定版本
  handler: sls_handler.handler
  events:
    - apigw:
        parameters:
          endpoints:
            - path: /
              method: ANY
  functionConf:
    timeout: 30 # 增加超时时间，因为上传图片较慢
    memorySize: 256
    environment:
      variables: # 这里可以设置，但建议在腾讯云控制台手动输入更安全
        NODE_ENV: production
